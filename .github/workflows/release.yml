name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux-amd64:
    name: Build and publish Linux amd64 release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release bundle
        run: ./scripts/build-linux-amd64.sh

      - name: Verify checksum
        working-directory: dist
        run: sha256sum -c gabutray-linux-amd64.tar.gz.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist/gabutray-linux-amd64.tar.gz \
            dist/gabutray-linux-amd64.tar.gz.sha256 \
            --verify-tag \
            --title "GabutRay $TAG_NAME" \
            --notes-file RELEASE.md
